<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Users - Admin Panel</title>
        <link
            href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
            crossorigin="anonymous"
            referrerpolicy="no-referrer"
        />
        <style>
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }

            :root {
                --primary: #6366f1;
                --primary-dark: #4f46e5;
                --primary-light: #a5b4fc;
                --success: #10b981;
                --warning: #f59e0b;
                --danger: #ef4444;
                --dark: #1e1b4b;
                --gray-50: #f8fafc;
                --gray-100: #f1f5f9;
                --gray-200: #e2e8f0;
                --gray-300: #cbd5e1;
                --gray-400: #94a3b8;
                --gray-500: #64748b;
                --gray-600: #475569;
                --gray-700: #334155;
                --gray-800: #1e293b;
                --gray-900: #0f172a;
                --card-shadow:
                    0 1px 3px rgba(0, 0, 0, 0.05), 0 1px 2px rgba(0, 0, 0, 0.1);
                --card-shadow-hover: 0 10px 40px rgba(0, 0, 0, 0.1);
            }

            body {
                font-family:
                    "Inter",
                    -apple-system,
                    BlinkMacSystemFont,
                    sans-serif;
                background: var(--gray-300);
                min-height: 100vh;
            }

            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 260px;
                background: linear-gradient(180deg, #1e293b 0%, #0f172a 100%);
                padding: 24px;
                display: flex;
                flex-direction: column;
                z-index: 100;
            }

            .logo {
                display: flex;
                align-items: center;
                gap: 12px;
                margin-bottom: 40px;
            }

            .logo-icon {
                width: 40px;
                height: 40px;
                background: linear-gradient(
                    135deg,
                    var(--primary) 0%,
                    #8b5cf6 100%
                );
                border-radius: 12px;
                display: flex;
                align-items: center;
                justify-content: center;
            }

            .logo-icon svg {
                width: 24px;
                height: 24px;
                fill: white;
            }

            .logo-text {
                color: white;
                font-size: 20px;
                font-weight: 700;
            }

            .nav-menu {
                display: flex;
                flex-direction: column;
                gap: 8px;
                flex: 1;
            }

            .nav-item {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                border-radius: 10px;
                color: var(--gray-400);
                text-decoration: none;
                transition: all 0.2s ease;
                cursor: pointer;
            }

            .nav-item:hover {
                background: rgba(255, 255, 255, 0.05);
                color: white;
            }

            .nav-item.active {
                background: linear-gradient(
                    135deg,
                    var(--primary) 0%,
                    #8b5cf6 100%
                );
                color: white;
            }

            .nav-item svg {
                width: 20px;
                height: 20px;
                fill: currentColor;
            }

            .logout {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 12px 16px;
                border-radius: 10px;
                color: var(--danger);
                text-decoration: none;
                transition: all 0.2s ease;
                cursor: pointer;
                border: none;
                background: rgba(239, 68, 68, 0.1);
                font-size: 14px;
                font-family: inherit;
                width: 100%;
            }

            .logout:hover {
                background: rgba(239, 68, 68, 0.2);
            }

            .logout svg {
                width: 20px;
                height: 20px;
                fill: currentColor;
            }

            .main-content {
                margin-left: 260px;
                padding: 32px;
                min-height: 100vh;
            }

            .header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 32px;
            }

            h1 {
                color: var(--gray-900);
                font-size: 28px;
                font-weight: 700;
            }

            .view-toggle {
                display: flex;
                gap: 8px;
            }

            .toggle-btn {
                padding: 8px 16px;
                border: 1px solid var(--gray-300);
                background: white;
                color: var(--gray-600);
                border-radius: 10px;
                cursor: pointer;
                transition: all 0.2s ease;
                font-size: 14px;
                font-family: inherit;
            }

            .toggle-btn.active {
                background: linear-gradient(
                    135deg,
                    var(--primary) 0%,
                    #8b5cf6 100%
                );
                color: white;
                border-color: transparent;
            }

            .users-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
                gap: 20px;
                margin-bottom: 32px;
            }

            .user-card {
                background: white;
                border-radius: 16px;
                padding: 24px;
                cursor: pointer;
                box-shadow: var(--card-shadow);
                transition: all 0.3s ease;
            }

            .user-card:hover {
                transform: translateY(-4px);
                box-shadow: var(--card-shadow-hover);
            }

            .user-header {
                display: flex;
                align-items: center;
                gap: 16px;
                margin-bottom: 16px;
            }

            .user-avatar {
                width: 48px;
                height: 48px;
                border-radius: 50%;
                background: linear-gradient(135deg, var(--primary), #8b5cf6);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                font-weight: 600;
                color: white;
            }

            .user-info h3 {
                font-size: 18px;
                color: var(--gray-800);
                margin-bottom: 4px;
            }

            .user-key {
                font-size: 13px;
                color: var(--gray-500);
                font-family: monospace;
            }

            .user-stats {
                display: grid;
                grid-template-columns: repeat(2, 1fr);
                gap: 12px;
            }

            .stat-item {
                background: var(--gray-50);
                padding: 12px;
                border-radius: 10px;
            }

            .stat-label {
                font-size: 12px;
                color: var(--gray-500);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 4px;
            }

            .stat-value {
                font-size: 20px;
                font-weight: 600;
                color: var(--gray-900);
            }

            .status-badge {
                display: inline-block;
                padding: 4px 12px;
                border-radius: 50px;
                font-size: 12px;
                font-weight: 600;
            }

            .status-badge.active {
                background: rgba(16, 185, 129, 0.1);
                color: var(--success);
            }

            .status-badge.inactive {
                background: rgba(239, 68, 68, 0.1);
                color: var(--danger);
            }

            .user-detail {
                display: none;
                background: white;
                border-radius: 16px;
                padding: 32px;
                box-shadow: var(--card-shadow);
            }

            .user-detail.show {
                display: block;
            }

            .detail-header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 32px;
                padding-bottom: 16px;
                border-bottom: 1px solid var(--gray-200);
            }

            .back-btn {
                display: flex;
                align-items: center;
                gap: 8px;
                padding: 8px 16px;
                background: var(--gray-100);
                border: 1px solid var(--gray-200);
                color: var(--gray-700);
                border-radius: 10px;
                cursor: pointer;
                transition: all 0.2s ease;
                font-size: 14px;
                font-family: inherit;
            }

            .back-btn:hover {
                background: var(--gray-200);
            }

            .summary-cards {
                display: grid;
                grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
                gap: 20px;
                margin-bottom: 32px;
            }

            .summary-card {
                background: white;
                padding: 24px;
                border-radius: 16px;
                box-shadow: var(--card-shadow);
            }

            .summary-card h3 {
                font-size: 13px;
                color: var(--gray-500);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }

            .summary-card .value {
                font-size: 32px;
                font-weight: 700;
                color: var(--gray-900);
                line-height: 1;
            }

            .table-card {
                background: white;
                border-radius: 16px;
                box-shadow: var(--card-shadow);
                overflow: hidden;
            }

            .table-header {
                padding: 20px 24px;
                border-bottom: 1px solid var(--gray-200);
            }

            .table-header h2 {
                font-size: 18px;
                font-weight: 600;
                color: var(--gray-800);
                display: flex;
                align-items: center;
                gap: 10px;
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }

            th {
                background: var(--gray-50);
                padding: 14px 20px;
                text-align: left;
                font-weight: 600;
                font-size: 12px;
                color: var(--gray-500);
                text-transform: uppercase;
                letter-spacing: 0.5px;
                border-bottom: 1px solid var(--gray-200);
            }

            td {
                padding: 16px 20px;
                border-bottom: 1px solid var(--gray-100);
                font-size: 14px;
                color: var(--gray-700);
            }

            tr:last-child td {
                border-bottom: none;
            }

            tr:hover {
                background: var(--gray-50);
            }

            .model-badge {
                display: inline-block;
                padding: 4px 12px;
                background: linear-gradient(135deg, #ddd6fe, #ede9fe);
                color: #7c3aed;
                border-radius: 6px;
                font-size: 12px;
                font-weight: 500;
            }

            .timestamp {
                color: var(--gray-500);
                font-size: 13px;
            }

            .token-value {
                font-family: monospace;
                font-weight: 600;
                font-size: 14px;
                font-variant-numeric: tabular-nums;
            }

            .token-value.input {
                color: var(--primary);
            }

            .token-value.output {
                color: var(--success);
            }

            .loading {
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 80px;
                color: var(--gray-600);
            }

            .loading-spinner {
                width: 48px;
                height: 48px;
                border: 4px solid var(--gray-200);
                border-top-color: var(--primary);
                border-radius: 50%;
                animation: spin 1s linear infinite;
                margin-bottom: 16px;
            }

            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }

            .empty-state {
                text-align: center;
                padding: 48px 24px;
                color: var(--gray-400);
            }

            .empty-state i {
                font-size: 48px;
                color: var(--gray-300);
                margin-bottom: 16px;
            }

            @media (max-width: 1024px) {
                .sidebar {
                    transform: translateX(-100%);
                }
                .main-content {
                    margin-left: 0;
                }
            }

            @media (max-width: 768px) {
                .main-content {
                    padding: 20px;
                }
                .users-grid {
                    grid-template-columns: 1fr;
                }
            }

            ::-webkit-scrollbar {
                width: 8px;
                height: 8px;
            }

            ::-webkit-scrollbar-track {
                background: var(--gray-100);
            }

            ::-webkit-scrollbar-thumb {
                background: var(--gray-300);
                border-radius: 4px;
            }

            ::-webkit-scrollbar-thumb:hover {
                background: var(--gray-400);
            }
        </style>
    </head>
    <body>
        <aside class="sidebar">
            <div class="logo">
                <div class="logo-icon">
                    <i class="fa-brands fa-square-web-awesome-stroke"></i>
                </div>
                <span class="logo-text">Admin Panel</span>
            </div>

            <nav class="nav-menu">
                <a class="nav-item" href="/admin/dashboard">
                    <i class="fa-brands fa-quinscape"></i>
                    <span>Dashboard</span>
                </a>
                <a class="nav-item active">
                    <i class="fa-solid fa-users"></i>
                    <span>Users</span>
                </a>
                <a class="nav-item" href="/admin/model-usage">
                    <i class="fa-solid fa-chart-line"></i>
                    <span>Model Usage</span>
                </a>
                <a class="nav-item" href="/admin/keys">
                    <i class="fa-solid fa-key"></i>
                    <span>API Keys</span>
                </a>
                <a class="nav-item" href="/admin/endpoints">
                    <i class="fa-solid fa-hexagon-nodes"></i>
                    <span>Endpoints</span>
                </a>
                <a class="nav-item" href="/admin/models">
                    <i class="fa-solid fa-comment-nodes"></i>
                    <span>Models</span>
                </a>
                <a class="nav-item" href="/admin/settings">
                    <i class="fa-solid fa-sliders"></i>
                    <span>Settings</span>
                </a>
            </nav>

            <button class="logout" onclick="logout()">
                <i class="fa-solid fa-right-from-bracket"></i>
                <span>Logout</span>
            </button>
        </aside>

        <main class="main-content">
            <div id="usersList">
                <header class="header">
                    <h1>Users</h1>
                </header>

                <div class="loading" id="loading">
                    <div class="loading-spinner"></div>
                </div>

                <div class="users-grid" id="usersGrid"></div>
            </div>

            <div id="userDetail" class="user-detail"></div>
        </main>

        <script>
            let allUsers = [];
            let currentUser = null;

            async function logout() {
                await fetch("/admin/logout", { method: "POST" });
                window.location.href = "/admin/login";
            }

            async function loadUsers() {
                try {
                    const response = await fetch("/api/users");
                    const data = await response.json();

                    allUsers = data.users;
                    renderUsers();
                } catch (error) {
                    console.error("Error loading users:", error);
                    document.getElementById("usersGrid").innerHTML =
                        '<div class="empty-state"><i class="fa-solid fa-exclamation-triangle"></i><p>Error loading users</p></div>';
                } finally {
                    document.getElementById("loading").style.display = "none";
                }
            }

            function renderUsers() {
                const grid = document.getElementById("usersGrid");

                if (allUsers.length === 0) {
                    grid.innerHTML =
                        '<div class="empty-state"><i class="fa-solid fa-users"></i><p>No users found</p></div>';
                    return;
                }

                grid.innerHTML = allUsers
                    .map(
                        (user) => `
                    <div class="user-card" onclick="showUserDetail('${escapeHtml(user.api_key)}')">
                        <div class="user-header">
                            <div class="user-avatar">${user.name.charAt(0).toUpperCase()}</div>
                            <div class="user-info">
                                <h3>${escapeHtml(user.name)}</h3>
                                <div class="user-key">${escapeHtml(user.api_key)}</div>
                            </div>
                        </div>
                        <div style="margin-bottom: 16px;">
                            <span class="status-badge ${user.active ? "active" : "inactive"}">
                                ${user.active ? "Active" : "Inactive"}
                            </span>
                        </div>
                        <div class="user-stats">
                            <div class="stat-item">
                                <div class="stat-label">Today</div>
                                <div class="stat-value">${user.daily_requests.toLocaleString()}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Total</div>
                                <div class="stat-value">${user.total_requests.toLocaleString()}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Input Tokens</div>
                                <div class="stat-value">${formatNumber(user.total_input_tokens)}</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-label">Output Tokens</div>
                                <div class="stat-value">${formatNumber(user.total_output_tokens)}</div>
                            </div>
                        </div>
                    </div>
                `,
                    )
                    .join("");
            }

            async function showUserDetail(apiKey) {
                try {
                    const response = await fetch(
                        `/api/users/${encodeURIComponent(apiKey)}`,
                    );
                    const data = await response.json();

                    currentUser = data;
                    renderUserDetail();
                } catch (error) {
                    console.error("Error loading user detail:", error);
                }
            }

            function renderUserDetail() {
                const user = currentUser;
                document.getElementById("usersList").style.display = "none";
                document.getElementById("userDetail").classList.add("show");

                document.getElementById("userDetail").innerHTML = `
                    <div class="detail-header">
                        <div>
                            <h1>${escapeHtml(user.name)}</h1>
                            <div class="user-key" style="margin-top: 0.5rem;">${escapeHtml(user.api_key)}</div>
                        </div>
                        <button class="back-btn" onclick="backToList()">
                            <i class="fa-solid fa-arrow-left"></i>
                            Back to Users
                        </button>
                    </div>

                    <div class="summary-cards">
                        <div class="summary-card">
                            <h3>Daily Requests</h3>
                            <div class="value">${user.daily_requests.toLocaleString()}</div>
                        </div>
                        <div class="summary-card">
                            <h3>Total Requests</h3>
                            <div class="value">${user.total_requests.toLocaleString()}</div>
                        </div>
                        <div class="summary-card">
                            <h3>Total Input Tokens</h3>
                            <div class="value">${formatNumber(user.total_input_tokens)}</div>
                        </div>
                        <div class="summary-card">
                            <h3>Total Output Tokens</h3>
                            <div class="value">${formatNumber(user.total_output_tokens)}</div>
                        </div>
                        <div class="summary-card">
                            <h3>Daily Input Tokens</h3>
                            <div class="value">${formatNumber(user.daily_input_tokens)}</div>
                        </div>
                        <div class="summary-card">
                            <h3>Daily Output Tokens</h3>
                            <div class="value">${formatNumber(user.daily_output_tokens)}</div>
                        </div>
                    </div>

                    <div class="table-card">
                        <div class="table-header">
                            <h2><i class="fa-solid fa-clock-rotate-left"></i> Recent Requests</h2>
                        </div>
                        <table>
                            <thead>
                                <tr>
                                    <th>Time</th>
                                    <th>Model</th>
                                    <th>Input Tokens</th>
                                    <th>Output Tokens</th>
                                    <th>Total Tokens</th>
                                    <th>Duration</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${user.recent_requests
                                    .map((req) => {
                                        const date = new Date(
                                            req.timestamp * 1000,
                                        );
                                        const timeStr =
                                            date.toLocaleTimeString();
                                        const dateStr =
                                            date.toLocaleDateString();
                                        return `
                                        <tr>
                                            <td>
                                                <div class="timestamp">${dateStr} ${timeStr}</div>
                                            </td>
                                            <td><span class="model-badge">${escapeHtml(req.model)}</span></td>
                                            <td><span class="token-value input">${req.input_tokens.toLocaleString()}</span></td>
                                            <td><span class="token-value output">${req.output_tokens.toLocaleString()}</span></td>
                                            <td><span class="token-value">${req.total_tokens.toLocaleString()}</span></td>
                                            <td>${req.duration.toFixed(2)}s</td>
                                        </tr>
                                    `;
                                    })
                                    .join("")}
                            </tbody>
                        </table>
                    </div>
                `;
            }

            function backToList() {
                document.getElementById("usersList").style.display = "block";
                document.getElementById("userDetail").classList.remove("show");
                currentUser = null;
            }

            function formatNumber(num) {
                if (num >= 1000000) {
                    return (num / 1000000).toFixed(1) + "M";
                } else if (num >= 1000) {
                    return (num / 1000).toFixed(1) + "K";
                }
                return num.toLocaleString();
            }

            function escapeHtml(text) {
                const div = document.createElement("div");
                div.textContent = text;
                return div.innerHTML;
            }

            // Load users on page load
            loadUsers();
        </script>
    </body>
</html>
