<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <link rel="icon" type="image/x-icon" href="favicon.ico" />
        <title>Unified API</title>
        <style>
            * {
                padding: 0;
                box-sizing: border-box;
            }

            body {
                font-family:
                    -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
                    Oxygen, sans-serif;
                background: #fafafa;
                color: #333;
                min-height: 100vh;
                padding: 40px 20px;
            }

            .container {
                max-width: 800px;
                margin: 0 auto;
            }

            header {
                text-align: center;
                padding: 40px 0;
                border-bottom: 1px solid #eee;
                margin-bottom: 40px;
            }

            .logo {
                font-size: 48px;
                color: #c0392b;
                margin-bottom: 10px;
            }

            h1 {
                font-size: 28px;
                font-weight: 300;
                color: #333;
            }

            .subtitle {
                color: #888;
                font-size: 14px;
                margin-top: 5px;
            }

            .lang-switch {
                position: absolute;
                top: 20px;
                right: 20px;
            }

            .lang-switch a {
                color: #888;
                text-decoration: none;
                padding: 5px 10px;
                font-size: 14px;
            }

            .lang-switch a:hover {
                color: #c0392b;
            }

            .stats {
                display: flex;
                justify-content: center;
                gap: 60px;
                margin-top: 100px;
                margin-bottom: 100px;
            }

            .stat-item {
                text-align: center;
            }

            .stat-value {
                font-size: 36px;
                font-weight: 200;
                color: #c0392b;
            }

            .stat-label {
                font-size: 12px;
                color: #888;
                text-transform: uppercase;
                letter-spacing: 1px;
            }

            .nav-links {
                display: flex;
                flex-direction: column;
                gap: 10px;
                max-width: 300px;
                margin: 40px auto;
            }

            .nav-link {
                display: block;
                padding: 15px 20px;
                background: white;
                border: 1px solid #eee;
                border-radius: 8px;
                text-decoration: none;
                color: #333;
                transition: all 0.2s;
            }

            .nav-link:hover {
                border-color: #c0392b;
                color: #c0392b;
            }
        </style>
    </head>
    <body>
        <div class="container">
            <header>
                <h1>Nore Proxy</h1>
                <p class="subtitle">A unified OpenAI API proxy server</p>
            </header>

            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="users-count">0</div>
                    <div class="stat-label">Users</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="uptime">0</div>
                    <div class="stat-label">Uptime</div>
                </div>
            </div>

            <nav class="nav-links">
                <a href="/usage" class="nav-link">View Usage</a>
                <a href="/models" class="nav-link">View Models</a>
            </nav>
        </div>

        <script>
            let ws = null;
            let currentTab = "requests";
            let stats = {};

            function formatDuration(seconds) {
                if (seconds < 1) return (seconds * 1000).toFixed(0) + "ms";
                if (seconds < 60) return seconds.toFixed(1) + "s";
                if (seconds < 3600) {
                    const minutes = Math.floor(seconds / 60);
                    const secs = Math.floor(seconds % 60);
                    return `${minutes}m ${secs}s`;
                }
                const hours = Math.floor(seconds / 3600);
                const mins = Math.floor((seconds % 3600) / 60);
                return `${hours}h ${mins}m`;
            }

            function formatNumber(num) {
                if (num >= 1000000) return (num / 1000000).toFixed(1) + "M";
                if (num >= 1000) return (num / 1000).toFixed(1) + "K";
                return num.toString();
            }

            // Refresh Stats
            async function refreshStats() {
                try {
                    const response = await fetch("/api/summary");
                    const data = await response.json();

                    // Animate number changes
                    document.getElementById("users-count").textContent =
                        data.total_api_keys || 0;
                    document.getElementById("uptime").textContent =
                        formatDuration(data.uptime);
                } catch (error) {
                    console.error("Error:", error);
                }
            }

            // Initial load
            refreshStats();

            // Refresh every 30 seconds
            setInterval(refreshStats, 30000);
        </script>
    </body>
</html>
